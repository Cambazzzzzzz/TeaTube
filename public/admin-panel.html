<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Paneli - TeaTube</title>
  <link rel="stylesheet" href="style-premium.css"/>
  <link rel="stylesheet" href="fa/css/all.min.css"/>
  <style>
    :root {
      --red: #ff0033;
      --bg1: #0a0000;
      --bg2: #1a0505;
      --bg3: #2a0a0a;
      --bg4: #3a1212;
      --text1: #ffe2e2;
      --text2: #d4b4b4;
      --text3: #b89494;
      --border: #5a2929;
      --accent: #ff0033;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; }
    body { background: var(--bg1); color: var(--text1); font-family: 'Inter', sans-serif; margin: 0; }
    
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon { font-size: 24px; color: var(--red); }
    
    .brand-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text1);
    }
    
    .brand-text span {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 8px;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .topbar-badge {
      background: var(--bg3);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    
    .sidebar {
      width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }
    
    .sidebar-logo-area {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    
    .org-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text1);
    }
    
    .org-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }
    
    .sidebar-section {
      padding: 8px 20px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 16px;
    }
    
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: var(--text2);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    
    .sidebar-item:hover {
      background: var(--bg3);
      color: var(--text1);
    }
    
    .sidebar-item.active {
      background: var(--red);
      color: white;
    }
    
    .sidebar-item i {
      width: 20px;
      text-align: center;
    }
    
    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .page-subtitle {
      font-size: 14px;
      color: var(--text3);
      margin-top: 4px;
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--red); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: var(--bg3); color: var(--text2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text1);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg2);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .table th,
    .table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .table th {
      background: var(--bg3);
      font-weight: 600;
      color: var(--text1);
    }
    
    .table td {
      color: var(--text2);
    }
    
    .table tr:hover {
      background: var(--bg3);
    }
    
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge-success { background: var(--success); color: white; }
    .badge-warning { background: var(--warning); color: white; }
    .badge-danger { background: var(--danger); color: white; }
    .badge-secondary { background: var(--bg4); color: var(--text3); }
    .badge-primary { background: var(--red); color: white; }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text1);
      margin-bottom: 6px;
    }
    
    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text1);
      font-size: 14px;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--red);
    }
    
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.hidden {
      display: none;
    }
    
    .modal {
      background: var(--bg2);
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text1);
    }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }
    
    .modal-close:hover {
      color: var(--text1);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    
    .page-btn {
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      cursor: pointer;
      text-decoration: none;
    }
    
    .page-btn:hover,
    .page-btn.active {
      background: var(--red);
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text3);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    
    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
    }
    
    .toast {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 300px;
      animation: slideIn 0.3s ease;
    }
    
    .toast.success {
      border-color: var(--success);
      color: var(--success);
    }
    
    .toast.error {
      border-color: var(--danger);
      color: var(--danger);
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        order: 2;
      }
      
      .main-content {
        order: 1;
      }
      
      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <i class="fas fa-shield-alt logo-icon"></i>
      <div class="brand-text">
        TeaTube Admin
        <span>Yönetim Paneli</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-badge" id="userRole">
        <i class="fas fa-shield-alt" style="margin-right:5px;color:#ef4444"></i>
        <span style="color:#ef4444;font-weight:600">Admin</span>
      </div>
      <button class="btn btn-danger" onclick="adminCikis()">
        <i class="fas fa-sign-out-alt"></i>
        Çıkış
      </button>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo-area">
        <div class="org-name">Admin Paneli</div>
        <div class="org-sub">Tüm Sistem Yönetimi</div>
      </div>

      <div class="sidebar-section">Sistem</div>
      <div class="sidebar-item active" data-page="dashboard" onclick="showAdminPage('dashboard')">
        <i class="fa-solid fa-gauge"></i> Dashboard
      </div>
      <div class="sidebar-item" data-page="reports" onclick="showAdminPage('reports')">
        <i class="fa-solid fa-flag"></i> Bildiriler
      </div>

      <div class="sidebar-section">İçerik Yönetimi</div>
      <div class="sidebar-item" data-page="videos" onclick="showAdminPage('videos')">
        <i class="fa-solid fa-play"></i> Videolar
      </div>
      <div class="sidebar-item" data-page="photos" onclick="showAdminPage('photos')">
        <i class="fa-solid fa-image"></i> Fotoğraflar
      </div>
      <div class="sidebar-item" data-page="music" onclick="showAdminPage('music')">
        <i class="fa-solid fa-music"></i> Müzikler
      </div>
      <div class="sidebar-item" data-page="comments" onclick="showAdminPage('comments')">
        <i class="fa-solid fa-comments"></i> Yorumlar
      </div>
      <div class="sidebar-item" data-page="ts-music-apps" onclick="showAdminPage('ts-music-apps')">
        <i class="fa-solid fa-microphone"></i> TS Music Başvuruları
      </div>

      <div class="sidebar-section">Kullanıcı Yönetimi</div>
      <div class="sidebar-item" data-page="users" onclick="showAdminPage('users')">
        <i class="fa-solid fa-users"></i> Kullanıcılar
      </div>
      <div class="sidebar-item" data-page="roles" onclick="showAdminPage('roles')">
        <i class="fa-solid fa-user-shield"></i> Roller & Yetkiler
      </div>
      <div class="sidebar-item" data-page="messages" onclick="showAdminPage('messages')">
        <i class="fa-solid fa-envelope"></i> Mesajlar
      </div>

      <div class="sidebar-section">Sosyal</div>
      <div class="sidebar-item" data-page="groups" onclick="showAdminPage('groups')">
        <i class="fa-solid fa-layer-group"></i> Gruplar
      </div>

      <div class="sidebar-section">Ayarlar</div>
      <div class="sidebar-item" data-page="sifreler" onclick="showAdminPage('sifreler')">
        <i class="fa-solid fa-key"></i> Admin Şifresi
      </div>
      <div class="sidebar-item" data-page="sistem-loglari" onclick="showAdminPage('sistem-loglari')">
        <i class="fa-solid fa-list"></i> Sistem Logları
      </div>
      <div class="sidebar-item" data-page="yedek" onclick="showAdminPage('yedek')">
        <i class="fa-solid fa-database"></i> Yedek Yönetimi
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="main-content">
      <!-- Dashboard içeriği buraya yüklenecek -->
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="admin-panel-app.js"></script>
</body>
</html>
