<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeaTube Admin Panel</title>
<link rel="stylesheet" href="fa/css/all.min.css" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0f0f0f; color:#fff; min-height:100vh; }
  
  /* LOGIN */
  #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:#1a1a1a; border-radius:16px; padding:40px; width:360px; border:1px solid rgba(255,255,255,0.08); }
  .login-box h1 { font-size:22px; margin-bottom:6px; }
  .login-box p { color:#aaa; font-size:13px; margin-bottom:28px; }
  
  /* MAIN */
  #adminApp { display:none; }
  .admin-layout { display:flex; min-height:100vh; }
  
  /* SIDEBAR */
  .admin-sidebar { width:220px; background:#111; border-right:1px solid rgba(255,255,255,0.06); padding:20px 0; flex-shrink:0; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; }
  .admin-sidebar .logo { padding:0 20px 20px; border-bottom:1px solid rgba(255,255,255,0.06); margin-bottom:12px; }
  .admin-sidebar .logo h2 { font-size:16px; color:#ff0033; }
  .admin-sidebar .logo p { font-size:11px; color:#666; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; font-size:13px; color:#aaa; transition:all 0.2s; border-left:3px solid transparent; }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:#fff; }
  .nav-item.active { background:rgba(255,0,51,0.1); color:#ff0033; border-left-color:#ff0033; }
  .nav-item i { width:16px; text-align:center; }
  .nav-section { font-size:10px; color:#555; padding:12px 20px 4px; text-transform:uppercase; letter-spacing:1px; }
  
  /* CONTENT */
  .admin-content { margin-left:220px; flex:1; padding:24px; }
  
  /* CARDS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:#1a1a1a; border-radius:12px; padding:16px; border:1px solid rgba(255,255,255,0.06); }
  .stat-card .val { font-size:28px; font-weight:700; color:#ff0033; }
  .stat-card .lbl { font-size:12px; color:#888; margin-top:4px; }
  
  /* TABLE */
  .admin-table { width:100%; border-collapse:collapse; font-size:13px; }
  .admin-table th { text-align:left; padding:10px 12px; background:#1a1a1a; color:#888; font-weight:500; border-bottom:1px solid rgba(255,255,255,0.06); }
  .admin-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
  .admin-table tr:hover td { background:rgba(255,255,255,0.02); }
  .table-wrap { background:#111; border-radius:12px; border:1px solid rgba(255,255,255,0.06); overflow:hidden; overflow-x:auto; }
  
  /* INPUTS */
  .a-input { background:#1a1a1a; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px 12px; color:#fff; font-size:13px; outline:none; width:100%; }
  .a-input:focus { border-color:#ff0033; }
  .a-btn { background:#ff0033; border:none; color:#fff; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
  .a-btn:hover { background:#cc0029; }
  .a-btn-sm { padding:4px 10px; font-size:12px; border-radius:6px; }
  .a-btn-gray { background:#333; }
  .a-btn-gray:hover { background:#444; }
  .a-btn-green { background:#1db954; }
  .a-btn-green:hover { background:#17a349; }
  .a-btn-orange { background:#ff8c00; }
  .a-btn-orange:hover { background:#e07b00; }
  
  /* BADGES */
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .badge-red { background:rgba(255,0,51,0.2); color:#ff4466; }
  .badge-green { background:rgba(29,185,84,0.2); color:#1db954; }
  .badge-yellow { background:rgba(255,200,0,0.2); color:#ffc800; }
  .badge-gray { background:rgba(255,255,255,0.1); color:#aaa; }
  
  /* PAGE HEADER */
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .page-header h2 { font-size:20px; font-weight:700; }
  
  /* MODAL */
  .a-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .a-modal { background:#1a1a1a; border-radius:16px; padding:24px; width:480px; max-width:95vw; max-height:90vh; overflow-y:auto; border:1px solid rgba(255,255,255,0.1); }
  .a-modal h3 { font-size:16px; margin-bottom:16px; }
  .a-form-group { margin-bottom:14px; }
  .a-form-group label { display:block; font-size:12px; color:#888; margin-bottom:6px; }
  
  /* SEARCH */
  .search-bar { display:flex; gap:8px; margin-bottom:16px; }
  .search-bar .a-input { flex:1; }
  
  /* TABS */
  .a-tabs { display:flex; gap:4px; margin-bottom:16px; background:#1a1a1a; padding:4px; border-radius:10px; width:fit-content; }
  .a-tab { padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; color:#888; }
  .a-tab.active { background:#ff0033; color:#fff; }
  
  /* AVATAR */
  .a-avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; }
  
  /* TOAST */
  #adminToast { position:fixed; bottom:24px; right:24px; background:#1db954; color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; z-index:99999; display:none; }
  
  /* TABLE */
  .a-table { width:100%; border-collapse:collapse; font-size:13px; }
  .a-table th { text-align:left; padding:10px 12px; background:#1a1a1a; color:#888; font-weight:500; border-bottom:1px solid rgba(255,255,255,0.06); }
  .a-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
  .a-table tr:hover td { background:rgba(255,255,255,0.02); }
  .a-table-wrap { background:#111; border-radius:12px; border:1px solid rgba(255,255,255,0.06); overflow:hidden; overflow-x:auto; }

  /* MOBILE */
  @media(max-width:768px) {
    .admin-sidebar { width:100%; height:auto; position:relative; }
    .admin-content { margin-left:0; padding:16px; }
    .admin-layout { flex-direction:column; }
    .stat-grid { grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>TeaTube Yönetim Paneli</p>
    <div class="a-form-group">
      <label>Kullanıcı Adı</label>
      <input type="text" id="adminUsername" class="a-input" placeholder="AdminTeaS" />
    </div>
    <div class="a-form-group">
      <label>Şifre</label>
      <input type="password" id="adminPassword" class="a-input" placeholder="••••••••" />
    </div>
    <button class="a-btn" style="width:100%;margin-top:8px;" onclick="adminLogin()">Giriş Yap</button>
    <p id="loginError" style="color:#ff4466;font-size:12px;margin-top:10px;display:none;"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="adminApp">
  <div class="admin-layout">
    <!-- SIDEBAR -->
    <div class="admin-sidebar">
      <div class="logo">
        <h2>⚡ TeaTube</h2>
        <p>Admin Panel</p>
      </div>
      <div class="nav-section">Genel</div>
      <div class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-chart-bar"></i> Dashboard</div>
      <div class="nav-section">Kullanıcılar</div>
      <div class="nav-item" onclick="showSection('users')"><i class="fas fa-users"></i> Kullanıcılar</div>
      <div class="nav-item" onclick="showSection('channels')"><i class="fas fa-tv"></i> Kanallar</div>
      <div class="nav-item" onclick="showSection('personal')"><i class="fas fa-user"></i> Kişisel Hesaplar</div>
      <div class="nav-item" onclick="showSection('ip-bans')"><i class="fas fa-ban"></i> IP Banları</div>
      <div class="nav-section">İçerik</div>
      <div class="nav-item" onclick="showSection('videos')"><i class="fas fa-video"></i> Videolar</div>
      <div class="nav-section">TS Music</div>
      <div class="nav-item" onclick="showSection('music-applications')"><i class="fas fa-music"></i> Başvurular</div>
      <div class="nav-item" onclick="showSection('music-artists')"><i class="fas fa-microphone"></i> Artistler</div>
      <div class="nav-item" onclick="showSection('music-songs')"><i class="fas fa-headphones"></i> Şarkılar</div>
      <div class="nav-section">Ayarlar</div>
      <div class="nav-item" onclick="showSection('admin-settings')"><i class="fas fa-cog"></i> Admin Ayarları</div>
      <div class="nav-item" onclick="adminLogout()" style="margin-top:auto;color:#ff4466;"><i class="fas fa-sign-out-alt"></i> Çıkış</div>
    </div>
    
    <!-- CONTENT -->
    <div class="admin-content" id="adminContent">
      <div id="mainContent"><!-- Dinamik içerik buraya gelecek --></div>
    </div>
  </div>
</div>

<div id="adminToast"></div>

<script src="admin.js"></script>
</body>
</html>
