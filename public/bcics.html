<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeaTube Admin</title>
<link rel="stylesheet" href="fa/css/all.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080808;color:#e8e8e8;min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(255,0,51,0.12) 0%,transparent 70%)}
.login-card{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo .icon{width:44px;height:44px;background:#ff0033;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.login-logo h1{font-size:20px;font-weight:700}
.login-logo p{font-size:12px;color:#666;margin-top:2px}
.a-form-group{margin-bottom:16px}
.a-form-group label{display:block;font-size:12px;color:#666;margin-bottom:6px;font-weight:500;letter-spacing:0.3px}
.a-input{background:#1a1a1a;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;color:#e8e8e8;font-size:14px;outline:none;width:100%;transition:border-color 0.2s}
.a-input:focus{border-color:#ff0033}
.a-btn{background:#ff0033;border:none;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s}
.a-btn:hover{background:#cc0029;transform:translateY(-1px)}
.a-btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.a-btn-gray{background:rgba(255,255,255,0.08)}
.a-btn-gray:hover{background:rgba(255,255,255,0.14)}
.a-btn-green{background:#1db954}
.a-btn-green:hover{background:#17a349}
.a-btn-orange{background:#e67e22}
.a-btn-orange:hover{background:#ca6f1e}

/* LAYOUT */
#adminApp{display:none}
.admin-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:#111;border-right:1px solid rgba(255,255,255,0.07);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo .dot{width:36px;height:36px;background:#ff0033;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.sidebar-logo h2{font-size:15px;font-weight:700}
.sidebar-logo p{font-size:11px;color:#666}
.nav-section{font-size:10px;color:#555;padding:16px 20px 6px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:#999;transition:all 0.15s;border-left:2px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,255,255,0.04);color:#e8e8e8}
.nav-item.active{background:rgba(255,0,51,0.08);color:#ff0033;border-left-color:#ff0033}
.nav-item i{width:16px;text-align:center;font-size:13px}
.nav-badge{background:#ff0033;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.07)}
.sidebar-user{display:flex;align-items:center;gap:10px}
.sidebar-user p{font-size:13px;font-weight:500}
.sidebar-user span{font-size:11px;color:#666}

/* TOPBAR */
.topbar{position:fixed;top:0;left:240px;right:0;height:56px;background:rgba(8,8,8,0.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);z-index:99;display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-title{font-size:15px;font-weight:600;flex:1}

/* CONTENT */
.admin-content{margin-left:240px;padding:80px 28px 40px;min-height:100vh}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s}
.stat-card:hover{border-color:rgba(255,255,255,0.14)}
.stat-card .s-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-card .val{font-size:30px;font-weight:700;line-height:1}
.stat-card .lbl{font-size:12px;color:#666;margin-top:6px}

/* TABLE */
.table-wrap{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;overflow-x:auto}
.a-table{width:100%;border-collapse:collapse;font-size:13px}
.a-table th{text-align:left;padding:12px 16px;background:rgba(255,255,255,0.03);color:#666;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(255,255,255,0.07)}
.a-table td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.a-table tr:last-child td{border-bottom:none}
.a-table tr:hover td{background:rgba(255,255,255,0.02)}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-header h2{font-size:18px;font-weight:700}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:rgba(255,0,51,0.15);color:#ff4466}
.badge-green{background:rgba(29,185,84,0.15);color:#1db954}
.badge-yellow{background:rgba(255,200,0,0.15);color:#ffc800}
.badge-gray{background:rgba(255,255,255,0.08);color:#aaa}

/* MODAL */
.a-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.a-modal{background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.7)}
.a-modal h3{font-size:17px;font-weight:700;margin-bottom:20px}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:18px}
.search-row .a-input{flex:1}

/* TABS */
.a-tabs{display:flex;gap:2px;margin-bottom:18px;background:#1a1a1a;padding:4px;border-radius:10px;width:fit-content}
.a-tab{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;transition:all 0.15s;font-weight:500}
.a-tab.active{background:#ff0033;color:#fff}

/* AVATAR */
.a-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.07)}

/* TOAST */
#adminToast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:99999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.4)}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:relative}
  .topbar{left:0}
  .admin-content{margin-left:0;padding:70px 16px 40px}
  .admin-layout{flex-direction:column}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}

/* Modal Styles */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  animation: fadeIn 0.2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background: #0f0f0f;
  border-radius: 12px;
  max-width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: slideUp 0.3s;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}

.modal-body {
  padding: 24px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  color: #999;
  font-weight: 500;
}

.btn-danger {
  background: #dc3545;
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.btn-danger:hover {
  background: #c82333;
  transform: translateY(-1px);
}

.loading {
  text-align: center;
  padding: 40px;
  color: #666;
}

.error {
  background: rgba(220,53,69,0.1);
  border: 1px solid #dc3545;
  color: #dc3545;
  padding: 16px;
  border-radius: 8px;
  margin: 20px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><i class="fas fa-shield-alt"></i></div>
      <div><h1>TeaTube Admin</h1><p>Yönetim Paneli</p></div>
    </div>
    <div class="a-form-group">
      <label>Şifre</label>
      <input type="password" id="adminPassword" class="a-input" placeholder="••••••••" onkeypress="if(event.key==='Enter')adminLogin()" />
    </div>
    <button class="a-btn" style="width:100%;margin-top:8px;height:44px;font-size:15px" onclick="adminLogin()">Giriş Yap</button>
    <p id="loginError" style="color:#ff4466;font-size:12px;margin-top:12px;display:none"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="adminApp" style="display:none;">
  <div class="admin-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="dot"><i class="fas fa-shield-alt"></i></div>
          <div><h2>TeaTube</h2><p>Admin Panel</p></div>
        </div>
      </div>
      <div class="nav-section">Genel</div>
      <div class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
      <div class="nav-section">Kullanicilar</div>
      <div class="nav-item" onclick="showSection('users')"><i class="fas fa-users"></i> Kullanicilar</div>
      <div class="nav-item" onclick="showSection('channels')"><i class="fas fa-tv"></i> Kanallar</div>
      <div class="nav-item" onclick="showSection('ip-bans')"><i class="fas fa-ban"></i> IP Banlari</div>
      <div class="nav-section">Icerik</div>
      <div class="nav-item" onclick="showSection('videos')"><i class="fas fa-video"></i> Videolar</div>
      <div class="nav-item" onclick="showSection('groups')"><i class="fas fa-layer-group"></i> Gruplar</div>
      <div class="nav-item" onclick="showSection('messages')"><i class="fas fa-comment-dots"></i> Mesajlaşmalar</div>
      <div class="nav-section">TeaSocial Music</div>
      <div class="nav-item" onclick="showSection('music-applications')"><i class="fas fa-file-alt"></i> Basvurular <span class="nav-badge" id="pendingBadge" style="display:none">0</span></div>
      <div class="nav-item" onclick="showSection('music-artists')"><i class="fas fa-microphone"></i> Artistler</div>
      <div class="nav-item" onclick="showSection('music-songs')"><i class="fas fa-music"></i> Sarkilar</div>
      <div class="nav-section">Sistem</div>
      <div class="nav-item" onclick="showSection('announcements')"><i class="fas fa-bullhorn"></i> Duyurular</div>
      <div class="nav-item" onclick="showSection('badges')"><i class="fas fa-certificate"></i> Rozetler</div>
      <div class="nav-item" onclick="loadTermsManagement()"><i class="fas fa-file-contract"></i> Kullanım Koşulları</div>
      <div class="nav-item" onclick="loadRealsTagManagement()"><i class="fas fa-tags"></i> Reals Etiketleri</div>
      <div class="nav-item" onclick="showSection('admin-settings')"><i class="fas fa-cog"></i> Ayarlar</div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div style="width:32px;height:32px;background:#ff0033;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff"><i class="fas fa-user-shield"></i></div>
          <div><p id="sidebarAdminName">Admin</p><span>Yonetici</span></div>
          <button onclick="adminLogout()" style="margin-left:auto;background:none;border:none;color:#666;cursor:pointer;font-size:16px" title="Cikis"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </div>

    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <span style="font-size:12px;color:#666" id="topbarTime"></span>
    </div>

    <div class="admin-content">
      <div id="mainContent"></div>
    </div>
  </div>
</div>

<div id="adminToast"></div>
<script src="admin-simple.js"></script>
<script>setInterval(()=>{const t=document.getElementById('topbarTime');if(t)t.textContent=new Date().toLocaleString('tr-TR')},1000)</script>
</body>
</html>
