<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC - Yakında Geliyor!</title>
  <link rel="stylesheet" href="fa/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      animation: move 25s infinite linear;
      bottom: -150px;
    }

    .bg-animation span:nth-child(1) {
      left: 25%;
      width: 80px;
      height: 80px;
      animation-delay: 0s;
    }

    .bg-animation span:nth-child(2) {
      left: 10%;
      width: 20px;
      height: 20px;
      animation-delay: 2s;
      animation-duration: 12s;
    }

    .bg-animation span:nth-child(3) {
      left: 70%;
      width: 20px;
      height: 20px;
      animation-delay: 4s;
    }

    .bg-animation span:nth-child(4) {
      left: 40%;
      width: 60px;
      height: 60px;
      animation-delay: 0s;
      animation-duration: 18s;
    }

    .bg-animation span:nth-child(5) {
      left: 65%;
      width: 20px;
      height: 20px;
      animation-delay: 0s;
    }

    .bg-animation span:nth-child(6) {
      left: 75%;
      width: 110px;
      height: 110px;
      animation-delay: 3s;
    }

    .bg-animation span:nth-child(7) {
      left: 35%;
      width: 150px;
      height: 150px;
      animation-delay: 7s;
    }

    .bg-animation span:nth-child(8) {
      left: 50%;
      width: 25px;
      height: 25px;
      animation-delay: 15s;
      animation-duration: 45s;
    }

    .bg-animation span:nth-child(9) {
      left: 20%;
      width: 15px;
      height: 15px;
      animation-delay: 2s;
      animation-duration: 35s;
    }

    .bg-animation span:nth-child(10) {
      left: 85%;
      width: 150px;
      height: 150px;
      animation-delay: 0s;
      animation-duration: 11s;
    }

    @keyframes move {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
        border-radius: 0;
      }
      100% {
        transform: translateY(-1000px) rotate(720deg);
        opacity: 0;
        border-radius: 50%;
      }
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
    }

    .logo {
      margin-bottom: 40px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .dc-logo {
      width: 120px;
      height: 120px;
      background: #fff;
      color: #667eea;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      font-size: 24px;
      margin-bottom: 60px;
      opacity: 0.9;
      font-weight: 300;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .countdown-item {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 40px;
      min-width: 140px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s;
    }

    .countdown-item:hover {
      transform: translateY(-10px);
    }

    .countdown-number {
      font-size: 56px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .countdown-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.8;
      font-weight: 600;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .feature {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s;
    }

    .feature:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .feature i {
      font-size: 36px;
      margin-bottom: 15px;
      display: block;
    }

    .feature h3 {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .feature p {
      font-size: 14px;
      opacity: 0.8;
      line-height: 1.5;
    }

    .notify-btn {
      background: #fff;
      color: #667eea;
      border: none;
      padding: 18px 50px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .notify-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    }

    .social-links {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-link {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s;
    }

    .social-link:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 18px;
      }

      .countdown {
        gap: 15px;
      }

      .countdown-item {
        padding: 20px 25px;
        min-width: 100px;
      }

      .countdown-number {
        font-size: 40px;
      }

      .countdown-label {
        font-size: 12px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="logo">
      <div class="dc-logo">DC</div>
    </div>

    <h1>DemlikChat Yakında Geliyor!</h1>
    <p class="subtitle">24 saat içinde hizmetinizde</p>

    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <div class="countdown-number" id="hours">00</div>
        <div class="countdown-label">Saat</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-number" id="minutes">00</div>
        <div class="countdown-label">Dakika</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-number" id="seconds">00</div>
        <div class="countdown-label">Saniye</div>
      </div>
    </div>

    <div class="features">
      <div class="feature">
        <i class="fas fa-comments"></i>
        <h3>Anlık Mesajlaşma</h3>
        <p>Arkadaşlarınla hızlı ve güvenli sohbet et</p>
      </div>
      <div class="feature">
        <i class="fas fa-microphone"></i>
        <h3>Sesli Sohbet</h3>
        <p>Kristal netliğinde ses kalitesi</p>
      </div>
      <div class="feature">
        <i class="fas fa-users"></i>
        <h3>Sunucular</h3>
        <p>Kendi topluluğunu oluştur</p>
      </div>
      <div class="feature">
        <i class="fas fa-mobile-alt"></i>
        <h3>Mobil Uyumlu</h3>
        <p>Her cihazda sorunsuz çalışır</p>
      </div>
    </div>

    <button class="notify-btn" onclick="notify()">
      <i class="fas fa-bell"></i> Beni Bilgilendir
    </button>

    <div class="social-links">
      <a href="#" class="social-link" title="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
      <a href="#" class="social-link" title="Discord">
        <i class="fab fa-discord"></i>
      </a>
      <a href="#" class="social-link" title="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </div>

  <script>
    // Geri sayım bitiş zamanını localStorage'dan al veya yeni oluştur
    let launchDate;
    
    if (!localStorage.getItem('dcLaunchTime')) {
      // İlk kez açılıyor, 24 saat sonrası için zaman belirle
      launchDate = new Date();
      launchDate.setHours(launchDate.getHours() + 24);
      localStorage.setItem('dcLaunchTime', launchDate.getTime());
      console.log('Yeni geri sayım başlatıldı:', launchDate);
    } else {
      // Daha önce kaydedilmiş zaman varsa onu kullan
      const savedTime = parseInt(localStorage.getItem('dcLaunchTime'));
      launchDate = new Date(savedTime);
      console.log('Kaydedilmiş geri sayım yüklendi:', launchDate);
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = launchDate.getTime() - now;

      if (distance < 0) {
        // Geri sayım bitti, Discord sayfasına yönlendir
        console.log('Geri sayım tamamlandı! Discord açılıyor...');
        localStorage.removeItem('dcLaunchTime'); // Temizle
        window.location.href = '/dc/discord';
        return;
      }

      // Saat, dakika, saniye hesapla
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // DOM'u güncelle
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    // İlk güncelleme
    updateCountdown();
    
    // Her saniye güncelle
    const countdownInterval = setInterval(updateCountdown, 1000);

    function notify() {
      const now = new Date().getTime();
      const distance = launchDate.getTime() - now;
      const hoursLeft = Math.floor(distance / (1000 * 60 * 60));
      const minutesLeft = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      
      alert(`Harika! DemlikChat ${hoursLeft} saat ${minutesLeft} dakika sonra açılacak! 🎉\n\nSeni bilgilendireceğiz!`);
    }

    // Debug: Geri sayımı sıfırlamak için (geliştirme amaçlı)
    // localStorage.removeItem('dcLaunchTime');
    
    // Sayfa kapatılmadan önce kontrol
    window.addEventListener('beforeunload', () => {
      console.log('Sayfa kapatılıyor, geri sayım korundu');
    });
  </script>
</body>
</html>
