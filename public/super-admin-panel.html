<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Süper Admin Paneli - TeaTube</title>
  <link rel="stylesheet" href="style-premium.css"/>
  <link rel="stylesheet" href="fa/css/all.min.css"/>
  <style>
    :root {
      --red: #ff0033;
      --bg1: #0a0000;
      --bg2: #1a0505;
      --bg3: #2a0a0a;
      --bg4: #3a1212;
      --text1: #ffe2e2;
      --text2: #d4b4b4;
      --text3: #b89494;
      --border: #5a2929;
      --accent: #ff0033;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; }
    body { background: var(--bg1); color: var(--text1); font-family: 'Inter', sans-serif; margin: 0; }
    
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon { font-size: 24px; color: var(--red); }
    
    .brand-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text1);
    }
    
    .brand-text span {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 8px;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .topbar-badge {
      background: var(--bg3);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    
    .sidebar {
      width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }
    
    .sidebar-section {
      margin-bottom: 24px;
    }
    
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 20px 8px;
    }
    
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: var(--text2);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    
    .sidebar-item:hover {
      background: var(--bg3);
      color: var(--text1);
    }
    
    .sidebar-item.active {
      background: var(--red);
      color: white;
    }
    
    .sidebar-item i {
      width: 20px;
      text-align: center;
    }
    
    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text1);
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--red); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: var(--bg3); color: var(--text2); }
    
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg2);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .table th,
    .table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .table th {
      background: var(--bg3);
      font-weight: 600;
      color: var(--text1);
    }
    
    .table td {
      color: var(--text2);
    }
    
    .table tr:hover {
      background: var(--bg3);
    }
    
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge-success { background: var(--success); color: white; }
    .badge-warning { background: var(--warning); color: white; }
    .badge-danger { background: var(--danger); color: white; }
    .badge-secondary { background: var(--bg4); color: var(--text3); }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text1);
      margin-bottom: 6px;
    }
    
    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text1);
      font-size: 14px;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--red);
    }
    
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: var(--bg2);
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text1);
    }
    
    .close-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 20px;
      cursor: pointer;
    }
    
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text1);
    }
    
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-select {
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text1);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    
    .page-btn {
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      cursor: pointer;
      text-decoration: none;
    }
    
    .page-btn:hover,
    .page-btn.active {
      background: var(--red);
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text3);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    
    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        order: 2;
      }
      
      .main-content {
        order: 1;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <i class="fas fa-shield-alt logo-icon"></i>
      <div class="brand-text">
        TeaTube Admin
        <span>Süper Yönetim Paneli</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-badge" id="userRole">Admin</div>
      <button class="btn btn-danger" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        Çıkış
      </button>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Genel</div>
        <button class="sidebar-item active" onclick="showPage('dashboard')">
          <i class="fas fa-tachometer-alt"></i>
          Dashboard
        </button>
        <button class="sidebar-item" onclick="showPage('reports')">
          <i class="fas fa-flag"></i>
          Bildiriler
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">İçerik Yönetimi</div>
        <button class="sidebar-item" onclick="showPage('videos')">
          <i class="fas fa-play-circle"></i>
          Videolar
        </button>
        <button class="sidebar-item" onclick="showPage('music')">
          <i class="fas fa-music"></i>
          Müzikler
        </button>
        <button class="sidebar-item" onclick="showPage('comments')">
          <i class="fas fa-comments"></i>
          Yorumlar
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">Kullanıcı Yönetimi</div>
        <button class="sidebar-item" onclick="showPage('users')">
          <i class="fas fa-users"></i>
          Kullanıcılar
        </button>
        <button class="sidebar-item" onclick="showPage('roles')">
          <i class="fas fa-user-shield"></i>
          Roller & Yetkiler
        </button>
        <button class="sidebar-item" onclick="showPage('messages')">
          <i class="fas fa-envelope"></i>
          Mesajlar
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">Sosyal</div>
        <button class="sidebar-item" onclick="showPage('groups')">
          <i class="fas fa-layer-group"></i>
          Gruplar
        </button>
        <button class="sidebar-item" onclick="showPage('ts-music-apps')">
          <i class="fas fa-microphone"></i>
          TS Music Başvuruları
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">Sistem</div>
        <button class="sidebar-item" onclick="showPage('logs')">
          <i class="fas fa-clipboard-list"></i>
          Sistem Logları
        </button>
        <button class="sidebar-item" onclick="showPage('settings')">
          <i class="fas fa-cog"></i>
          Ayarlar
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div id="pageContent">
        <!-- Dashboard içeriği buraya yüklenecek -->
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Düzenle</div>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div id="modalBody">
        <!-- Modal içeriği buraya yüklenecek -->
      </div>
    </div>
  </div>

  <script src="super-admin-panel.js"></script>
</body>
</html>
