<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeaTube Login Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      background: #0f0f0f;
      color: white;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 14px;
    }
    button {
      background: #ff0033;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #cc0029;
    }
    #result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #1a1a1a;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
    }
    .success { background: #1a4d1a !important; }
    .error { background: #4d1a1a !important; }
  </style>
</head>
<body>
  <h1>🔥 TeaTube Login Test</h1>
  
  <input type="text" id="username" placeholder="Username" value="testuser">
  <input type="password" id="password" placeholder="Password" value="test123">
  <button onclick="testLogin()">GİRİŞ YAP</button>
  
  <div id="result"></div>

  <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3456/api'
      : window.location.origin + '/api';

    console.log('API_URL:', API_URL);

    async function testLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('result');
      
      resultDiv.textContent = 'Giriş yapılıyor...';
      resultDiv.className = '';
      
      try {
        console.log('Login isteği gönderiliyor:', { username, password: '***' });
        
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        console.log('Response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);
        
        if (response.ok) {
          resultDiv.className = 'success';
          resultDiv.textContent = '✅ GİRİŞ BAŞARILI!\n\n' + JSON.stringify(data, null, 2);
          
          // LocalStorage'a kaydet
          localStorage.setItem('Tea_user', JSON.stringify(data.user));
          
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          resultDiv.className = 'error';
          resultDiv.textContent = '❌ GİRİŞ BAŞARISIZ\n\n' + JSON.stringify(data, null, 2);
        }
      } catch (error) {
        console.error('Login error:', error);
        resultDiv.className = 'error';
        resultDiv.textContent = '❌ HATA\n\n' + error.message;
      }
    }
    
    // Enter tuşu ile giriş
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') testLogin();
    });
  </script>
</body>
</html>
